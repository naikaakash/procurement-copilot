name: deploy

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'src/**'
      - 'public/**'
      - 'data/**'
      - 'procurement_data_sample/**'
      - 'procurement_data_sample_original/**'
      - 'project_memory/**'
      - 'auth.ts'
      - 'proxy.ts'
      - 'next.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - 'Dockerfile'
      - '.dockerignore'
      - 'infra/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  id-token: write    # OIDC federation -> Azure
  contents: read
  packages: write    # push to GHCR

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  # NOTE: these env vars are workflow-level. The `azure/cli@v2` action runs
  # its inlineScript inside its own Docker container which does NOT inherit
  # runner env vars unless explicitly forwarded. So any inlineScript that
  # needs these must use GitHub Actions expressions (`${{ env.X }}`) at
  # render time, not bash `$X` at runtime.
  AZURE_RG: sap-assistant-rg
  CONTAINER_APP: sapassistant-app
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build-push-deploy:
    name: build → push → revision
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v5

      - name: Compute image tag
        id: tag
        run: echo "value=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ steps.tag.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy infra + roll Container App to new image
        uses: azure/cli@v2
        with:
          inlineScript: |
            az deployment group create \
              --resource-group "sap-assistant-rg" \
              --template-file infra/main.bicep \
              --parameters containerImage="ghcr.io/${{ github.repository }}:${{ steps.tag.outputs.value }}" \
              --query "properties.outputs.containerAppUrl.value" -o tsv \
              | tee deployed-url.txt
            echo "Deployed: $(cat deployed-url.txt)"

      - name: Wait for new revision to become healthy
        uses: azure/cli@v2
        with:
          inlineScript: |
            for i in $(seq 1 24); do
              status=$(az containerapp revision list \
                --name "sapassistant-app" \
                --resource-group "sap-assistant-rg" \
                --query "[?properties.active].{name:name,health:properties.healthState,running:properties.runningState}" -o json \
                | tee /tmp/rev.json)
              if echo "$status" | grep -q '"health": "Healthy"'; then
                echo "✓ Healthy revision detected"
                cat /tmp/rev.json
                exit 0
              fi
              echo "Attempt $i: waiting 5s for healthy revision..."
              sleep 5
            done
            echo "✗ Revision did not become healthy in 2 minutes"
            cat /tmp/rev.json
            exit 1

      - name: Smoke test
        uses: azure/cli@v2
        with:
          inlineScript: |
            URL=$(az containerapp show -g "sap-assistant-rg" -n "sapassistant-app" --query "properties.configuration.ingress.fqdn" -o tsv)
            echo "Hitting https://$URL/api/health"
            for i in $(seq 1 12); do
              code=$(curl -s -o /tmp/body -w "%{http_code}" "https://$URL/api/health" || echo "000")
              if [ "$code" = "200" ]; then
                echo "✓ /api/health 200"
                cat /tmp/body
                exit 0
              fi
              echo "Attempt $i: got $code, retrying..."
              sleep 5
            done
            echo "✗ /api/health never returned 200"
            cat /tmp/body
            exit 1
