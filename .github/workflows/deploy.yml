name: deploy

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'Dockerfile'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  id-token: write    # OIDC federation -> Azure
  contents: read
  packages: write    # push to GHCR

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  AZURE_RG: sap-assistant-rg
  CONTAINER_APP: sapassistant-app
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build-push-deploy:
    name: build → push → revision
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v5

      - name: Compute image tag
        id: tag
        run: echo "value=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ steps.tag.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Update Container App image
        uses: azure/cli@v2
        with:
          inlineScript: |
            az containerapp update \
              --resource-group "$AZURE_RG" \
              --name        "$CONTAINER_APP" \
              --image       "${IMAGE}:${{ steps.tag.outputs.value }}" \
              --query "properties.configuration.ingress.fqdn" -o tsv \
              | tee fqdn.txt
            echo "Deployed: https://$(cat fqdn.txt)"
