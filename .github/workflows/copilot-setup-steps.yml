name: "Copilot Setup Steps"

# Preinstalls everything the GitHub Copilot cloud agent needs BEFORE it
# starts working on an issue/PR. Without this, the agent would discover
# dependencies by trial and error, which is slow and unreliable.
#
# The agent picks up this file automatically once it's on the default
# branch. It must be named exactly `copilot-setup-steps.yml`, live in
# `.github/workflows/`, and contain exactly one job called
# `copilot-setup-steps`.
#
# Stack: Next.js 16 (TypeScript) + Playwright E2E. No .NET, no SPA
# subproject — everything lives at the repo root.

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # MUST be named `copilot-setup-steps` or the agent will not pick it up.
  copilot-setup-steps:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js 20
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build Next.js (warm cache, verify typecheck + lint)
        run: npm run build
        env:
          # Build-time placeholders so middleware/auth typechecks pass.
          # Real values come from Container App env at runtime.
          AUTH_SECRET: build-time-placeholder-not-used
          AUTH_TRUST_HOST: 'true'

      - name: Install Playwright browsers (Chromium + system deps)
        run: npx playwright install --with-deps chromium

      - name: Print agent-ready summary
        run: |
          echo "::group::Toolchain"
          node --version
          npm --version
          npx playwright --version
          echo "::endgroup::"
          echo ""
          echo "Agent environment is ready."
          echo "Conventions: .github/copilot-instructions.md"
          echo "Run the app:        npm run dev"
          echo "Build:              npm run build"
          echo "Run E2E suite:      npm run test:e2e"
          echo "Seed mock SQL:      npm run seed:sql  (needs SQL_CONNECTION_STRING)"
